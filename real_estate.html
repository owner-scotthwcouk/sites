<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Real Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <!-- Full-width hero with floating card -->
    <div class="relative h-screen bg-slate-800 flex items-center justify-center px-4">
        <div class="absolute top-0 left-0 w-full p-6 flex justify-between text-white">
            <span class="font-bold text-xl tracking-widest">[Business Name]</span>
        </div>
        
        <div class="bg-white p-10 md:p-16 rounded-lg shadow-2xl max-w-2xl w-full text-center z-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Find Your Home in [City]</h1>
            <p class="text-gray-600 mb-8">We help you buy, sell, and invest with confidence.</p>
            <div class="bg-slate-100 p-4 rounded mb-6 text-2xl font-bold text-slate-800">
                [Phone Number]
            </div>
            <button class="w-full bg-blue-600 text-white font-bold py-4 rounded hover:bg-blue-700 transition">View Listings</button>
        </div>
    </div>

    <!-- Minimalist Reviews below -->
    <section class="max-w-4xl mx-auto py-16 px-6 text-center">
        <h2 class="text-2xl font-bold text-slate-800 mb-8">What Our Clients Say</h2>
        <p class="text-xl text-gray-600 italic">"[Review 1 Text]"</p>
        <p class="font-bold text-slate-900 mt-4">- [Reviewer 1 Name]</p>
    </section>
</body>
</html>
