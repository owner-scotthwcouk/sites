<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Gym & Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-white font-sans">
    <header class="bg-black border-b border-neutral-800 p-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter text-yellow-500">[Business Name]</h1>
            <p class="text-lg font-bold mt-2 md:mt-0">Call: [Phone Number]</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-24 text-center">
        <h2 class="text-5xl font-black uppercase mb-6">Transform Your Life</h2>
        <p class="text-xl text-neutral-400 mb-10">The premier fitness destination in [City].</p>
        <button class="bg-yellow-500 text-black px-8 py-4 text-xl font-bold uppercase hover:bg-yellow-400 transition">Join Now</button>
    </section>

    <section class="bg-neutral-800 py-16">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-3xl font-black text-center text-white mb-10 uppercase">Member Success</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="p-6 bg-neutral-900 border border-neutral-700">
                    <p class="text-neutral-300 italic mb-4">"[Review 1 Text]"</p>
                    <p class="font-bold text-yellow-500 uppercase">- [Reviewer 1 Name]</p>
                </div>
                <div class="p-6 bg-neutral-900 border border-neutral-700">
                    <p class="text-neutral-300 italic mb-4">"[Review 2 Text]"</p>
                    <p class="font-bold text-yellow-500 uppercase">- [Reviewer 2 Name]</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-black text-neutral-500 text-center py-8">
        <p>&copy; 2026 [Business Name].</p>
        <p>[Address]</p>
    </footer>
</body>
</html>
