<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Plumber</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans flex flex-col min-h-screen">
    <div class="flex flex-col md:flex-row flex-grow">
        <!-- Split Layout: Left Text -->
        <main class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-center">
            <h1 class="text-4xl md:text-6xl font-extrabold text-blue-900 mb-6">[Business Name]</h1>
            <p class="text-xl text-gray-600 mb-8">24/7 Emergency Plumbing Services in [City]. We fix leaks, unclog drains, and repair pipes fast.</p>
            <div class="bg-blue-50 border-l-4 border-blue-600 p-6 mb-8">
                <p class="text-2xl font-bold text-blue-800">Call Now: [Phone Number]</p>
            </div>
            <div class="space-y-4">
                <h3 class="font-bold text-gray-800">Customer Review:</h3>
                <blockquote class="italic text-gray-600">"[Review 1 Text]" <br> <span class="font-bold text-blue-600">- [Reviewer 1 Name]</span></blockquote>
            </div>
        </main>
        <!-- Split Layout: Right Color/Image Placeholder -->
        <aside class="w-full md:w-1/2 bg-blue-600 flex items-center justify-center p-12 text-white">
            <div class="text-center border-4 border-white border-dashed p-12 rounded-xl">
                <h2 class="text-3xl font-bold mb-4">Fast & Reliable</h2>
                <p>Serving [City] with pride.</p>
            </div>
        </aside>
    </div>
</body>
</html>
