<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Salon</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-rose-50 font-sans">
    <!-- Floating Header & Soft Curves -->
    <div class="p-6">
        <header class="max-w-4xl mx-auto bg-white/80 backdrop-blur-md rounded-full shadow-sm py-4 px-8 flex justify-between items-center sticky top-4 z-50">
            <h1 class="text-2xl font-serif text-rose-800">[Business Name]</h1>
            <a href="tel:[Phone Number]" class="bg-rose-400 text-white px-6 py-2 rounded-full hover:bg-rose-500 transition">Book: [Phone Number]</a>
        </header>

        <main class="max-w-4xl mx-auto mt-16 text-center">
            <h2 class="text-5xl md:text-6xl font-serif text-gray-800 mb-6">Discover Your <br><span class="text-rose-500 italic">Signature Look.</span></h2>
            <p class="text-gray-600 text-lg mb-12">Luxury hair and beauty services located in [City].</p>
            
            <div class="bg-white rounded-[3rem] p-12 shadow-xl border border-rose-100">
                <h3 class="text-xl font-serif text-rose-800 mb-6">What Our Clients Say</h3>
                <p class="text-gray-600 text-lg italic leading-relaxed mb-4">"[Review 1 Text]"</p>
                <p class="font-bold text-gray-800">- [Reviewer 1 Name]</p>
            </div>
        </main>
    </div>
</body>
</html>
