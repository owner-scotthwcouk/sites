<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Hair & Beauty Salon</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 text-gray-800 font-sans">
    <header class="bg-white p-6 shadow-sm border-b border-pink-100">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-serif text-pink-600 tracking-wide">[Business Name]</h1>
            <p class="text-lg font-medium text-gray-600 mt-2 md:mt-0">Book: [Phone Number]</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h2 class="text-4xl font-serif text-gray-900 mb-6">Elevate Your Style</h2>
        <p class="text-lg text-gray-500 mb-10">Premium hair and beauty services tailored for you in [City].</p>
        <button class="bg-pink-500 text-white px-8 py-3 rounded-full text-lg shadow-md hover:bg-pink-600 transition">Book an Appointment</button>
    </section>

    <section class="bg-white py-16">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-2xl font-serif text-center text-pink-600 mb-10">Client Love</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="p-8 bg-pink-50 rounded-2xl text-center shadow-sm">
                    <p class="text-gray-600 mb-4">"[Review 1 Text]"</p>
                    <p class="font-bold text-gray-900">- [Reviewer 1 Name]</p>
                </div>
                <div class="p-8 bg-pink-50 rounded-2xl text-center shadow-sm">
                    <p class="text-gray-600 mb-4">"[Review 2 Text]"</p>
                    <p class="font-bold text-gray-900">- [Reviewer 2 Name]</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-100 text-gray-500 text-center py-8 text-sm">
        <p>&copy; 2026 [Business Name]. Beauty & Care.</p>
        <p>[Address]</p>
    </footer>
</body>
</html>
