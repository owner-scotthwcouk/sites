<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 font-sans text-amber-900">
    <!-- Warm Tones and Circular elements -->
    <header class="bg-amber-600 text-white p-10 text-center rounded-b-[50%] shadow-lg">
        <h1 class="text-5xl font-serif font-bold italic mb-2">[Business Name]</h1>
        <p class="text-amber-100 text-lg">Freshly baked daily in [City]</p>
    </header>

    <main class="max-w-4xl mx-auto mt-12 px-6">
        <div class="flex flex-col md:flex-row items-center justify-between bg-white p-8 rounded-3xl shadow-md border-2 border-amber-100 mb-10">
            <div class="mb-6 md:mb-0 text-center md:text-left">
                <h2 class="text-3xl font-bold text-amber-800 mb-2">Custom Orders & Pastries</h2>
                <p class="text-amber-700">Bread, cakes, cookies, and more.</p>
            </div>
            <a href="tel:[Phone Number]" class="bg-amber-500 text-white px-8 py-4 rounded-full font-bold shadow hover:bg-amber-600 transition">Order: [Phone Number]</a>
        </div>

        <div class="text-center p-8 bg-amber-100 rounded-3xl border border-amber-200">
            <div class="text-4xl text-amber-400 mb-4">★★★★★</div>
            <p class="text-xl font-serif italic text-amber-800">"[Review 1 Text]"</p>
            <p class="font-bold mt-4 text-amber-600">- [Reviewer 1 Name]</p>
        </div>
    </main>
</body>
</html>
