<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Family Dentistry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-teal-50 text-gray-800 font-sans">
    <header class="bg-teal-600 text-white p-6 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-bold">[Business Name]</h1>
            <p class="text-xl font-semibold mt-2 md:mt-0">Book Now: [Phone Number]</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h2 class="text-5xl font-extrabold text-teal-900 mb-6">Your Best Smile Starts Here</h2>
        <p class="text-xl text-teal-700 mb-10">Comprehensive dental care for the whole family in [City].</p>
        <button class="bg-teal-600 text-white px-8 py-3 rounded-full text-lg font-bold hover:bg-teal-700 transition">Schedule an Appointment</button>
    </section>

    <section class="bg-white py-16">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-3xl font-bold text-center text-teal-800 mb-10">Patient Testimonials</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="p-6 border-t-4 border-teal-500 bg-gray-50 rounded shadow-sm">
                    <p class="text-gray-600 mb-4">"[Review 1 Text]"</p>
                    <p class="font-bold text-teal-600">- [Reviewer 1 Name]</p>
                </div>
                <div class="p-6 border-t-4 border-teal-500 bg-gray-50 rounded shadow-sm">
                    <p class="text-gray-600 mb-4">"[Review 2 Text]"</p>
                    <p class="font-bold text-teal-600">- [Reviewer 2 Name]</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-teal-900 text-white text-center py-8">
        <p>&copy; 2026 [Business Name]. Caring for [City].</p>
        <p>[Address]</p>
    </footer>
</body>
</html>
