<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Dental Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Top Information Bar -->
    <div class="bg-teal-700 text-white text-sm py-2 px-6 flex justify-between items-center">
        <span>📍 [Address]</span>
        <span class="font-bold">📞 [Phone Number]</span>
    </div>
    
    <!-- Centered Boxed Layout -->
    <div class="max-w-5xl mx-auto bg-white shadow-xl mt-8 rounded-xl overflow-hidden">
        <header class="p-10 text-center border-b border-gray-100">
            <h1 class="text-4xl font-light text-teal-800 tracking-wide">[Business Name]</h1>
            <p class="text-gray-500 mt-2 uppercase tracking-widest text-sm">Family & Cosmetic Dentistry</p>
        </header>

        <section class="p-10">
            <h2 class="text-2xl text-center mb-8 text-gray-800">Welcome to a brighter smile in [City]</h2>
            
            <!-- 3 Column Feature -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                <div class="p-6 bg-teal-50 rounded-lg">
                    <h3 class="font-bold text-teal-800 mb-2">Checkups</h3>
                    <p class="text-gray-600 text-sm">Comprehensive exams.</p>
                </div>
                <div class="p-6 bg-teal-50 rounded-lg">
                    <h3 class="font-bold text-teal-800 mb-2">Cosmetic</h3>
                    <p class="text-gray-600 text-sm">Whitening & veneers.</p>
                </div>
                <div class="p-6 bg-teal-50 rounded-lg">
                    <h3 class="font-bold text-teal-800 mb-2">Implants</h3>
                    <p class="text-gray-600 text-sm">Restorative care.</p>
                </div>
            </div>
        </section>

        <section class="bg-gray-100 p-10 text-center">
            <p class="text-lg italic text-gray-600 mb-2">"[Review 1 Text]"</p>
            <p class="font-bold text-teal-700">- [Reviewer 1 Name]</p>
        </section>
    </div>
</body>
</html>
