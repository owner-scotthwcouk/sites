<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Yoga Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F5DC] text-[#4A5D23] font-serif">
    <!-- Zen Earthy Tones -->
    <div class="min-h-screen flex flex-col items-center justify-center text-center p-6">
        <div class="max-w-2xl">
            <h1 class="text-5xl md:text-7xl font-light mb-6">[Business Name]</h1>
            <p class="text-xl md:text-2xl text-[#6B8E23] mb-12 italic">Find your center in [City].</p>
            
            <div class="bg-white/50 p-10 rounded-xl backdrop-blur-sm border border-[#6B8E23]/20 mb-12">
                <h2 class="text-2xl font-semibold mb-4">Join a Class Today</h2>
                <p class="font-sans text-lg text-gray-700 mb-6">Vinyasa, Hatha, and Restorative sessions available daily.</p>
                <a href="tel:[Phone Number]" class="inline-block bg-[#4A5D23] text-white font-sans px-8 py-3 rounded-full hover:bg-[#3A4D13] transition">Call: [Phone Number]</a>
            </div>

            <div class="px-8">
                <p class="text-lg leading-relaxed text-[#556B2F] italic">"[Review 1 Text]"</p>
                <p class="font-bold text-[#4A5D23] mt-4 font-sans text-sm tracking-widest uppercase">- [Reviewer 1 Name]</p>
            </div>
        </div>
    </div>
</body>
</html>
