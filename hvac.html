<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Heating & Air</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans m-0 p-0 flex flex-col h-screen">
    <!-- Split Hot/Cold Backgrounds -->
    <header class="bg-gray-900 text-white text-center py-6 shadow-md z-10 relative">
        <h1 class="text-3xl font-black uppercase">[Business Name]</h1>
        <p class="text-gray-400 font-bold tracking-wider">HVAC Services in [City]</p>
    </header>

    <div class="flex flex-col md:flex-row flex-grow">
        <div class="w-full md:w-1/2 bg-blue-600 text-white flex flex-col justify-center items-center p-10 text-center">
            <h2 class="text-4xl font-bold mb-4">A/C Cooling</h2>
            <p class="text-blue-200 mb-8 max-w-sm">Keep your home perfectly chilled during the hot summer months.</p>
        </div>
        <div class="w-full md:w-1/2 bg-orange-600 text-white flex flex-col justify-center items-center p-10 text-center">
            <h2 class="text-4xl font-bold mb-4">Heating</h2>
            <p class="text-orange-200 mb-8 max-w-sm">Stay warm and cozy when the winter chill hits.</p>
        </div>
    </div>

    <!-- Floating Contact Card -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="bg-white p-8 rounded-xl shadow-2xl border-2 border-gray-100 text-center pointer-events-auto max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Need Service?</h3>
            <p class="text-3xl font-black text-gray-900 mb-6">[Phone Number]</p>
            <hr class="mb-6">
            <p class="italic text-gray-600 text-sm">"[Review 1 Text]"</p>
            <p class="font-bold text-gray-800 text-sm mt-2">- [Reviewer 1 Name]</p>
        </div>
    </div>
</body>
</html>
