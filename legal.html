<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Law Firm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-serif">
    <header class="bg-stone-900 text-stone-100 p-6 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-bold uppercase tracking-wider">[Business Name]</h1>
            <p class="text-lg font-sans">Consultations: [Phone Number]</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h2 class="text-4xl font-bold text-stone-800 mb-6">Experienced Legal Representation</h2>
        <p class="text-xl text-stone-600 mb-10 font-sans">Dedicated to protecting your rights and achieving results in [City].</p>
        <button class="bg-stone-800 text-white px-8 py-3 text-lg font-semibold hover:bg-stone-700 transition font-sans">Request a Consultation</button>
    </section>

    <section class="bg-white py-16 border-t border-stone-200 font-sans">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-2xl font-bold text-center text-stone-900 mb-10 font-serif">Testimonials</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="p-6 bg-stone-50 border-l-4 border-stone-800 shadow">
                    <p class="text-gray-700 mb-4 text-sm leading-relaxed">"[Review 1 Text]"</p>
                    <p class="font-bold text-stone-900">- [Reviewer 1 Name]</p>
                </div>
                <div class="p-6 bg-stone-50 border-l-4 border-stone-800 shadow">
                    <p class="text-gray-700 mb-4 text-sm leading-relaxed">"[Review 2 Text]"</p>
                    <p class="font-bold text-stone-900">- [Reviewer 2 Name]</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-stone-900 text-stone-400 text-center py-8 font-sans text-sm">
        <p>&copy; 2026 [Business Name]. Attorneys at Law.</p>
        <p>[Address]</p>
    </footer>
</body>
</html>
