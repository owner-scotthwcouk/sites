<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Pest Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans border-t-8 border-red-600">
    <!-- High Urgency / Warning Layout -->
    <div class="max-w-5xl mx-auto px-6 py-10">
        <header class="flex flex-col items-center text-center mb-12">
            <div class="bg-red-600 text-white font-black uppercase px-4 py-1 mb-4 rounded text-sm tracking-widest">Immediate Response</div>
            <h1 class="text-5xl font-black text-gray-900 uppercase tracking-tight">[Business Name]</h1>
            <p class="text-xl font-bold text-gray-500 mt-2">[City] Exterminators</p>
        </header>

        <div class="bg-gray-100 p-10 rounded-xl text-center shadow-inner mb-12">
            <h2 class="text-3xl font-black text-red-600 mb-4 uppercase">Got Bugs? Get Us.</h2>
            <p class="text-gray-700 text-lg mb-8">Termites, Ants, Rodents, and Bed Bugs eliminated fast and safely.</p>
            <a href="tel:[Phone Number]" class="inline-block bg-red-600 text-white text-2xl font-black px-10 py-5 rounded-lg shadow-[0_5px_0_rgb(153,27,27)] hover:bg-red-700 hover:shadow-[0_2px_0_rgb(153,27,27)] hover:translate-y-1 transition-all">
                CALL: [Phone Number]
            </a>
        </div>

        <div class="border-2 border-gray-200 p-8 rounded-xl flex flex-col md:flex-row items-center gap-6">
            <div class="text-5xl text-yellow-500">🛡️</div>
            <div>
                <p class="text-gray-600 italic text-lg">"[Review 1 Text]"</p>
                <p class="font-black text-gray-900 mt-2 uppercase">- [Reviewer 1 Name]</p>
            </div>
        </div>
    </div>
</body>
</html>
