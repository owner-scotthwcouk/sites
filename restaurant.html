<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-serif">
    <!-- Dark Theme Hero -->
    <header class="relative h-screen flex flex-col items-center justify-center text-center p-6 border-b border-neutral-800">
        <h1 class="text-6xl md:text-8xl font-bold tracking-tighter text-amber-500 mb-4">[Business Name]</h1>
        <p class="text-2xl font-light text-gray-400 mb-10">Fine dining in the heart of [City]</p>
        <button class="border border-amber-500 text-amber-500 px-8 py-3 hover:bg-amber-500 hover:text-black transition duration-300">Reserve a Table: [Phone Number]</button>
    </header>

    <!-- Overlapping Grid Section -->
    <section class="py-20 px-6 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div>
                <h2 class="text-4xl text-amber-500 mb-6">Our Story</h2>
                <p class="text-gray-400 leading-relaxed mb-6">Experience culinary excellence with locally sourced ingredients and a passion for flavor.</p>
                <div class="border-l-2 border-amber-500 pl-4">
                    <p class="italic text-gray-300">"[Review 1 Text]"</p>
                    <p class="text-amber-500 mt-2">- [Reviewer 1 Name]</p>
                </div>
            </div>
            <div class="bg-neutral-900 aspect-square rounded-full flex items-center justify-center border border-neutral-800">
                <span class="text-neutral-600">[Dish Placeholder]</span>
            </div>
        </div>
    </section>
</body>
</html>
