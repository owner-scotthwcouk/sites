<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Delicious Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 text-gray-900 font-serif">
    <header class="bg-red-800 text-white p-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-4xl font-bold tracking-wide">[Business Name]</h1>
            <p class="text-lg mt-2 md:mt-0 font-sans">Reservations: [Phone Number]</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-24 text-center">
        <h2 class="text-5xl font-extrabold text-red-900 mb-4">Experience Authentic Flavors</h2>
        <p class="text-xl text-gray-700 mb-8 font-sans">The best dining experience in [City]. Join us for unforgettable meals.</p>
        <button class="bg-red-700 text-white px-8 py-3 rounded text-lg font-bold hover:bg-red-800 transition font-sans">View Menu</button>
    </section>

    <section class="bg-white py-16">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-3xl font-bold text-center text-red-800 mb-10">What Our Guests Say</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 font-sans">
                <div class="p-6 bg-orange-100 rounded-lg shadow-md text-center">
                    <p class="italic text-gray-800 mb-4">"[Review 1 Text]"</p>
                    <p class="font-bold text-red-700">- [Reviewer 1 Name]</p>
                </div>
                <div class="p-6 bg-orange-100 rounded-lg shadow-md text-center">
                    <p class="italic text-gray-800 mb-4">"[Review 2 Text]"</p>
                    <p class="font-bold text-red-700">- [Reviewer 2 Name]</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white text-center py-8 font-sans">
        <p>&copy; 2026 [Business Name].</p>
        <p>[Address]</p>
    </footer>
</body>
</html>
