<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Photography Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans">
    <!-- Minimalist Masonry Vibe -->
    <header class="p-10 flex flex-col items-center justify-center text-center min-h-[50vh]">
        <h1 class="text-5xl font-light tracking-widest uppercase mb-4">[Business Name]</h1>
        <p class="text-gray-400 text-sm tracking-[0.2em] mb-8">PORTRAIT & WEDDING PHOTOGRAPHY • [CITY]</p>
        <a href="tel:[Phone Number]" class="border border-black px-6 py-2 text-sm uppercase tracking-widest hover:bg-black hover:text-white transition">Book a Session: [Phone Number]</a>
    </header>

    <div class="max-w-7xl mx-auto px-10 grid grid-cols-1 md:grid-cols-2 gap-10 mb-20">
        <div class="bg-gray-100 aspect-[3/4] flex items-center justify-center text-gray-400 text-sm tracking-widest">
            [ IMAGE GALLERY PLACEHOLDER ]
        </div>
        <div class="flex flex-col justify-center p-10">
            <h2 class="text-2xl font-light mb-6 uppercase tracking-wider">Capturing Moments</h2>
            <p class="text-gray-500 leading-loose mb-10">We specialize in natural light photography, creating timeless images that tell your unique story.</p>
            <div class="border-l border-black pl-6">
                <p class="italic text-gray-600">"[Review 1 Text]"</p>
                <p class="text-xs uppercase tracking-widest mt-4 font-bold">- [Reviewer 1 Name]</p>
            </div>
        </div>
    </div>
</body>
</html>
