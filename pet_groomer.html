<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Pet Grooming</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-violet-100 font-sans text-gray-800">
    <!-- Playful Bubbly Layout -->
    <div class="max-w-3xl mx-auto pt-12 px-4">
        <header class="bg-white rounded-[3rem] p-8 text-center shadow-lg border-4 border-violet-200 relative">
            <div class="text-4xl mb-2">🐾</div>
            <h1 class="text-4xl font-extrabold text-violet-600 tracking-tight">[Business Name]</h1>
            <p class="text-lg font-bold text-violet-400 mt-2">[City]'s Favorite Pet Spa</p>
        </header>

        <main class="mt-8 space-y-6">
            <div class="bg-white rounded-3xl p-8 shadow text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Book a Grooming Session!</h2>
                <p class="text-gray-600 mb-6">Baths, haircuts, nail trimming, and lots of treats.</p>
                <a href="tel:[Phone Number]" class="inline-block bg-violet-500 text-white font-bold text-xl px-8 py-4 rounded-full shadow hover:bg-violet-600 transition">Call [Phone Number]</a>
            </div>

            <div class="bg-violet-200 rounded-3xl p-8 text-center">
                <p class="text-lg text-violet-900 font-medium italic">"[Review 1 Text]"</p>
                <p class="font-extrabold text-violet-700 mt-2">- [Reviewer 1 Name]</p>
            </div>
        </main>
    </div>
</body>
</html>
