<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Electrician</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <!-- Neon Yellow Dark Mode Grid -->
    <div class="p-6 md:p-12 max-w-6xl mx-auto">
        <header class="mb-12 border-b border-gray-700 pb-6 flex flex-col md:flex-row justify-between items-end">
            <div>
                <h1 class="text-4xl md:text-5xl font-bold text-yellow-400">[Business Name]</h1>
                <p class="text-gray-400 mt-2 text-lg">Master Electricians in [City]</p>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <span class="block text-sm text-gray-500 uppercase tracking-widest">Emergency Dispatch</span>
                <span class="text-3xl font-bold text-white">[Phone Number]</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 hover:border-yellow-400 transition">
                <h3 class="text-yellow-400 font-bold text-xl mb-4">Wiring & Panels</h3>
                <p class="text-gray-400">Safe, code-compliant upgrades.</p>
            </div>
            <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 hover:border-yellow-400 transition">
                <h3 class="text-yellow-400 font-bold text-xl mb-4">Lighting</h3>
                <p class="text-gray-400">Indoor, outdoor, and security lighting.</p>
            </div>
            <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 hover:border-yellow-400 transition">
                <h3 class="text-yellow-400 font-bold text-xl mb-4">Repairs</h3>
                <p class="text-gray-400">Troubleshooting and fast fixes.</p>
            </div>
        </div>

        <div class="mt-12 bg-yellow-400 text-black p-8 rounded-xl text-center">
            <p class="text-xl font-medium italic">"[Review 1 Text]"</p>
            <p class="font-bold mt-2">- [Reviewer 1 Name]</p>
        </div>
    </div>
</body>
</html>
