<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Roofing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <!-- Stacked Banners & High Contrast -->
    <div class="bg-red-700 text-white text-center py-3 font-bold uppercase tracking-wider text-sm">
        Free Inspections in [City] - Call Today
    </div>
    
    <header class="bg-white p-8 border-b shadow-sm text-center">
        <h1 class="text-4xl font-extrabold text-slate-900">[Business Name]</h1>
        <p class="text-slate-500 mt-2 font-medium">Licensed & Insured Roofing Contractors</p>
    </header>

    <section class="bg-slate-800 text-white py-20 px-6 text-center">
        <h2 class="text-4xl md:text-5xl font-bold mb-6">Protect Your Home.</h2>
        <p class="text-xl text-slate-300 mb-10 max-w-2xl mx-auto">We specialize in roof replacements, leak repairs, and storm damage restoration.</p>
        <button class="bg-red-600 text-white px-10 py-4 font-bold text-xl rounded shadow-lg hover:bg-red-700 transition">[Phone Number]</button>
    </section>

    <section class="max-w-4xl mx-auto py-16 px-6">
        <div class="bg-white p-10 rounded-lg shadow-md border-t-8 border-slate-800 text-center">
            <h3 class="text-xl font-bold text-slate-800 mb-4 uppercase">Verified Customer Review</h3>
            <p class="text-slate-600 text-lg italic">"[Review 1 Text]"</p>
            <p class="font-bold text-red-700 mt-4">- [Reviewer 1 Name]</p>
        </div>
    </section>
</body>
</html>
