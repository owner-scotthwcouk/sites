<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Auto Repair</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 text-gray-900 font-sans">
    <header class="bg-red-600 text-white p-6 shadow-lg border-b-4 border-gray-900">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-black uppercase tracking-wide">[Business Name]</h1>
            <p class="text-xl font-bold mt-2 md:mt-0">Call: [Phone Number]</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h2 class="text-5xl font-black text-gray-900 mb-6 uppercase">Honest & Fast Auto Repair</h2>
        <p class="text-xl text-gray-700 mb-10 font-bold">Keeping [City] safely on the road.</p>
        <button class="bg-gray-900 text-white px-10 py-4 text-xl font-black uppercase hover:bg-gray-800 transition shadow-xl">Get an Estimate</button>
    </section>

    <section class="bg-gray-100 py-16 border-t border-gray-300">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-3xl font-black text-center text-red-600 mb-10 uppercase">Customer Reviews</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="p-6 bg-white border-l-8 border-red-600 shadow-md">
                    <p class="text-gray-800 italic mb-4 font-medium">"[Review 1 Text]"</p>
                    <p class="font-black text-gray-900 uppercase">- [Reviewer 1 Name]</p>
                </div>
                <div class="p-6 bg-white border-l-8 border-red-600 shadow-md">
                    <p class="text-gray-800 italic mb-4 font-medium">"[Review 2 Text]"</p>
                    <p class="font-black text-gray-900 uppercase">- [Reviewer 2 Name]</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-gray-400 text-center py-8 font-bold">
        <p>&copy; 2026 [Business Name]. Auto Services.</p>
        <p>[Address]</p>
    </footer>
</body>
</html>
