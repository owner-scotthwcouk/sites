<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Auto Repair</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 text-gray-900 font-sans">
    <!-- Industrial Look: Borders and Table layout -->
    <header class="bg-black text-white p-6 border-b-8 border-yellow-500 flex flex-col items-center">
        <h1 class="text-4xl font-black uppercase tracking-widest">[Business Name]</h1>
        <p class="text-yellow-500 font-bold mt-2 tracking-widest">AUTO REPAIR CENTER</p>
    </header>

    <main class="max-w-5xl mx-auto mt-12 bg-white border-4 border-black p-8 shadow-[8px_8px_0px_rgba(0,0,0,1)]">
        <div class="flex flex-col md:flex-row justify-between items-center border-b-4 border-black pb-8 mb-8">
            <div>
                <h2 class="text-3xl font-black uppercase text-gray-800">Need a fix in [City]?</h2>
                <p class="text-lg font-medium text-gray-600 mt-2">Brakes, Engines, Tires & Diagnostics.</p>
            </div>
            <div class="bg-yellow-500 text-black border-4 border-black px-6 py-4 mt-6 md:mt-0 text-center">
                <span class="block text-sm font-bold uppercase">Call the Shop:</span>
                <span class="block text-3xl font-black">[Phone Number]</span>
            </div>
        </div>

        <table class="w-full text-left border-collapse border-4 border-black">
            <thead>
                <tr class="bg-gray-100">
                    <th class="border-4 border-black p-4 font-black uppercase">Service Highlight</th>
                    <th class="border-4 border-black p-4 font-black uppercase">Customer Feedback</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="border-4 border-black p-4 font-bold">Oil Changes & Routine Maintenance</td>
                    <td class="border-4 border-black p-4 italic text-gray-700">"[Review 1 Text]" <br><br> <span class="font-black text-black not-italic">- [Reviewer 1 Name]</span></td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
