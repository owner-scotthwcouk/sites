<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Landscaping</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-900 font-sans text-white">
    <!-- Card Overlays and Earth Tones -->
    <div class="max-w-6xl mx-auto p-6 pt-12">
        <div class="bg-emerald-800 rounded-2xl p-8 md:p-16 relative overflow-hidden shadow-2xl border border-emerald-700">
            <!-- Decorative circle -->
            <div class="absolute -top-20 -right-20 w-64 h-64 bg-emerald-600 rounded-full opacity-50 blur-3xl"></div>
            
            <h1 class="text-4xl md:text-6xl font-bold mb-4 relative z-10">[Business Name]</h1>
            <p class="text-emerald-200 text-xl mb-10 relative z-10">Transforming outdoor spaces in [City]. Lawn care, design, and maintenance.</p>
            
            <div class="inline-block bg-white text-emerald-900 font-bold px-8 py-4 rounded-lg relative z-10 hover:bg-emerald-50 transition">
                Book a Consultation: [Phone Number]
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6 relative z-20 -top-8 px-4">
            <div class="bg-white text-gray-800 p-8 rounded-xl shadow-lg border-t-4 border-emerald-500">
                <h3 class="font-bold text-emerald-800 mb-2">Our Services</h3>
                <ul class="list-disc list-inside text-gray-600 space-y-2">
                    <li>Lawn Maintenance</li>
                    <li>Hardscaping</li>
                    <li>Garden Design</li>
                </ul>
            </div>
            <div class="bg-white text-gray-800 p-8 rounded-xl shadow-lg border-t-4 border-emerald-500">
                <h3 class="font-bold text-emerald-800 mb-2">Review</h3>
                <p class="italic text-gray-600 mb-4">"[Review 1 Text]"</p>
                <p class="font-bold text-emerald-900">- [Reviewer 1 Name]</p>
            </div>
        </div>
    </div>
</body>
</html>
