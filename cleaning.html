<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Business Name] - Professional Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-cyan-50 text-slate-800 font-sans">
    <header class="bg-cyan-600 text-white p-6 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-bold tracking-tight">[Business Name]</h1>
            <p class="text-lg font-semibold mt-2 md:mt-0">Call Us: [Phone Number]</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h2 class="text-4xl font-extrabold text-cyan-900 mb-6">Spotless Spaces, Happy Faces</h2>
        <p class="text-lg text-slate-600 mb-10">Top-rated residential and commercial cleaning in [City].</p>
        <button class="bg-cyan-500 text-white px-8 py-3 rounded text-lg font-bold shadow hover:bg-cyan-600 transition">Get a Quote</button>
    </section>

    <section class="bg-white py-16">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-2xl font-bold text-center text-cyan-800 mb-10">Our Reviews</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="p-6 border border-cyan-100 bg-cyan-50 rounded-lg">
                    <p class="italic text-slate-700 mb-4">"[Review 1 Text]"</p>
                    <p class="font-bold text-cyan-700">- [Reviewer 1 Name]</p>
                </div>
                <div class="p-6 border border-cyan-100 bg-cyan-50 rounded-lg">
                    <p class="italic text-slate-700 mb-4">"[Review 2 Text]"</p>
                    <p class="font-bold text-cyan-700">- [Reviewer 2 Name]</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-cyan-900 text-cyan-100 text-center py-8">
        <p>&copy; 2026 [Business Name]. Cleaning Services.</p>
        <p>[Address]</p>
    </footer>
</body>
</html>
